site_name: ChemWorld
site_description: 用于训练和评测实验智能体的可回放物理化学因果世界与交互环境。
site_url: https://sunyrain.github.io/ChemWorld/
repo_url: https://github.com/sunyrain/ChemWorld
repo_name: sunyrain/ChemWorld
edit_uri: edit/main/docs/
copyright: ChemWorld · 物理化学机理世界与 Agent 评测环境，不用于指导真实实验

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    # Keep top-level groups as native collapsible navigation items; Material's
    # sections mode renders them as permanently expanded headings.
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en
  - i18n:
      docs_structure: suffix
      fallback_to_default: false
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          site_description: A replayable causal physical-chemistry environment for training and evaluating experimental agents.
          copyright: ChemWorld · Mechanistic world models and agent evaluation, not instructions for physical laboratory work
          nav:
            - Home: index.md
            - Research Thesis:
                - Why ChemWorld: vision.md
                - Experimental Intelligence: experimental_intelligence.md
                - Causal Worlds: causal_worlds.md
                - System Model: architecture.md
            - Evaluation & Evidence:
                - Benchmark Design: benchmark_overview.md
                - Research Findings: research_findings.md
            - From Simulation to Reality:
                - Real-world Bridge: real_world_bridge.md

extra_css:
  - assets/stylesheets/language-switch.css
  - assets/stylesheets/site.css

extra_javascript:
  - assets/javascripts/navigation-v7.js

nav:
