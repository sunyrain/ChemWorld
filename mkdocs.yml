site_name: ChemWorld-Bench
site_description: 面向闭环实验智能体的可回放虚拟化学研究环境与评测工具。
site_url: https://sunyrain.github.io/ChemWorld/
repo_url: https://github.com/sunyrain/ChemWorld
repo_name: sunyrain/ChemWorld
edit_uri: edit/main/docs/
copyright: ChemWorld-Bench · 虚拟研究环境，不用于指导真实实验

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en

extra:
  alternate:
    - name: 中文
      link: https://sunyrain.github.io/ChemWorld/
      lang: zh
    - name: English
      link: https://sunyrain.github.io/ChemWorld/en/
      lang: en

extra_css:
  - assets/stylesheets/language-switch.css
  - assets/stylesheets/site.css

extra_javascript:
  - assets/javascripts/navigation-v5.js

nav:
  - 首页: index.md
  - 快速开始:
      - 安装与首个回合: getting_started.md
      - 任务目录: tasks.md
      - 可视化实验室: interactive_task_lab.md
      - 示例与 Notebook: demos.md
      - English overview: en/index.md
  - 构建智能体:
      - Agent 接口: agent_interface.md
      - 操作语言: operations.md
      - Action 与 Recipe: action_schema.md
      - 交互示例: agent_interaction_examples.md
      - Wrapper: wrappers.md
      - LLM Agent: llm_agent_harness.md
      - World Model 学习: world_model_learning.md
  - 评测与证据:
      - 科学状态与证据: benchmark_release.md
      - 评测协议: benchmark_protocol.md
      - Baseline 与资源公平: baseline_reference.md
      - Seed 与数据划分: seed_suite.md
      - 提交与验证: submission.md
      - 结果可信链: release_integrity.md
  - 环境与任务:
      - 系统架构: architecture.md
      - Campaign 与 Experiment: campaign_model.md
      - 任务卡: task_cards.md
      - 任务分类: task_taxonomy.md
      - 环境卡: env_cards.md
      - 材料身份: material_identity.md
      - 安全与成本: safety_cost.md
      - 仪器合同: instrument_contracts.md
      - 虚拟光谱: spectroscopy.md
      - 世界律: world_law.md
      - 模型成熟度: model_maturity.md
      - 物理化学核心: physchem_core_design.md
      - 机理协议: mechanism_schema.md
      - 计算后端: backends.md
      - 反应与分离: reaction_separation_tasks.md
      - 场景生成: scenario_generation.md
  - 数据与参考:
      - 数据集层: dataset_layer.md
      - 验证与质量保证: validation.md
      - 本地评测机: local_eval_machine.md
      - API 参考: api_reference.md
      - 适用范围与限制: limitations.md
      - 伦理与数据: ethics_and_data.md
      - 发布说明: release_notes.md
      - 教学路线: tutorial_curriculum_zh.md
