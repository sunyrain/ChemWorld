  - 研究主线:
      - 为什么需要 ChemWorld: vision.md
      - 什么是实验智能: experimental_intelligence.md
      - 研究发现与证据: benchmark_release.md
      - 适用范围与证据边界: limitations.md
      - 从虚拟世界到真实实验: real_world_bridge.md
  - 探索世界:
      - 一次闭环实验: one_experiment.md
      - 会改变规律的世界: causal_worlds.md
      - 旗舰世界与任务: worlds.md
      - 打开可视化界面: interactive_task_lab.md
      - 完整任务目录: tasks.md
      - 阅读任务卡: task_cards.md
      - 阅读环境卡: env_cards.md
  - 构建智能体:
