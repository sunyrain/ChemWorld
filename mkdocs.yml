site_name: ChemWorld-Bench 文档
site_description: 面向闭环虚拟化学实验和 agent world model 研究的基准文档。
site_url: https://sunyrain.github.io/ChemWorld/
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - toc.integrate
    - toc.follow
    - search.highlight
    - content.code.copy
plugins:
  - search:
      lang:
        - zh
        - en
extra:
  alternate:
    - name: 中文
      link: https://sunyrain.github.io/ChemWorld/
      lang: zh
    - name: English
      link: https://sunyrain.github.io/ChemWorld/en/
      lang: en
extra_css:
  - assets/stylesheets/language-switch.css
nav:
  - 首页: index.md
  - 项目状态:
      - 当前进展: current_progress.md
      - 站点审计: site_audit_zh.md
      - 站点层级规划: site_structure_zh.md
      - 发布检查表: release_checklist.md
      - 路线图: roadmap.md
  - 核心概念:
      - 项目总览: chemworld_overview_zh.md
      - 世界律: world_law.md
      - 架构设计: architecture.md
      - 技术架构: technical_architecture_zh.md
      - 物理化学核心设计: physchem_core_design.md
      - World Model 学习: world_model_learning.md
  - Benchmark 合同:
      - 环境卡: env_cards.md
      - 任务分类: task_taxonomy.md
      - 任务列表: tasks.md
      - 任务卡: task_cards.md
      - 场景生成: scenario_generation.md
      - Campaign 模型: campaign_model.md
      - 操作协议: operations.md
      - Action 协议: action_schema.md
      - Mechanism 协议: mechanism_schema.md
      - 仪器合同: instrument_contracts.md
      - 虚拟光谱: spectroscopy.md
      - 安全与成本: safety_cost.md
      - Wrapper 与合法性: wrappers.md
      - Agent 交互接口: agent_interface.md
      - LLM Agent Harness: llm_agent_harness.md
