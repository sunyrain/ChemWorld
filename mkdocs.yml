site_name: ChemWorld
site_description: 用于训练和评测实验智能体的可回放因果虚拟化学实验室。
site_url: https://sunyrain.github.io/ChemWorld/
repo_url: https://github.com/sunyrain/ChemWorld
repo_name: sunyrain/ChemWorld
edit_uri: edit/main/docs/
copyright: ChemWorld · 因果虚拟实验世界，不用于指导真实实验

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    # Keep top-level groups as native collapsible navigation items; Material's
    # sections mode renders them as permanently expanded headings.
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search:
      lang:
        - zh
        - en

extra:
  alternate:
    - name: 中文
      link: https://sunyrain.github.io/ChemWorld/
      lang: zh
    - name: English
      link: https://sunyrain.github.io/ChemWorld/en/
      lang: en

extra_css:
  - assets/stylesheets/language-switch.css
  - assets/stylesheets/site.css

extra_javascript:
  - assets/javascripts/navigation-v7.js

