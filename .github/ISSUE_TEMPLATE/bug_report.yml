name: Bug Report
description: Report a bug, regression, or incorrect benchmark behavior.
title: "[Bug] "
labels: ["kind:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Commands, task id, seed, agent, trajectory, or notebook cell.
      placeholder: |
        chemworld run --task reaction-to-purification --agent scripted_chemistry --seed 0
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS:
        Python:
        ChemWorld commit:
  - type: textarea
    id: logs
    attributes:
      label: Logs Or Artifacts
      description: Paste short logs or link files. Avoid uploading private eval secrets.
