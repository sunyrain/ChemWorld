name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[dev,docs]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src/chemworld
      - name: Tests
        run: pytest
      - name: Docs
        run: mkdocs build --strict

