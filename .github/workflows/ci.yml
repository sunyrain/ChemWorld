name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev,docs]"
      - name: Lint
        run: python -m ruff check .
      - name: Type check
        run: python -m mypy src/chemworld
      - name: Tests
        run: python -m pytest
      - name: Docs
        run: python -m mkdocs build --strict
      - name: Non-editable wheel smoke
        run: python scripts/smoke_test_wheel.py

  reference-validation:
    name: External reference backends
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install reference backends
        run: python -m pip install -e ".[dev,physchem-ref]"
      - name: Reference validation
        run: python scripts/run_reference_validation.py
