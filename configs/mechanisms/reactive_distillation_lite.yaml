network_id: reactive_distillation_lite
metadata:
  description: >
    Esterification-like reversible reaction with volatile pseudo-species for
    distillation and recovery planning.
  mechanism_family: reactive_separation
  qualitative_tags: [reversible_reaction, vapor_removal, distillation_tradeoff]
species:
  - species_id: Acid
    formula: C2H4O2
    phase: liquid
    observable_aliases: [acid_reactant]
  - species_id: Alcohol
    formula: C2H6O
    phase: liquid
    observable_aliases: [alcohol_reactant]
  - species_id: Ester
    formula: C4H8O2
    phase: liquid
    observable_aliases: [product]
  - species_id: Water
    formula: H2O
    phase: liquid
    observable_aliases: [water_byproduct]
  - species_id: Ether
    formula: C4H10O
    phase: liquid
    observable_aliases: [volatile_impurity]
  - species_id: Ester_vapor
    formula: C4H8O2
    phase: gas
    observable_aliases: [product_vapor]
  - species_id: Alcohol_vapor
    formula: C2H6O
    phase: gas
    observable_aliases: [alcohol_vapor]
  - species_id: Water_vapor
    formula: H2O
    phase: gas
    observable_aliases: [water_vapor]
reactions:
  - reaction_id: esterification
    equation: Acid + Alcohol <=> Ester + Water
    delta_h_J_per_mol: -5000.0
    rate_law:
      rate_law_id: esterification_rate
      equation_id: reversible_arrhenius
      parameters:
        A: 0.018
        Ea_J_per_mol: 17000.0
        K_eq: 2.2
  - reaction_id: ether_side_reaction
    equation: 2 Alcohol => Ether + Water
    delta_h_J_per_mol: -12000.0
    rate_law:
      rate_law_id: ether_rate
      equation_id: arrhenius
      parameters:
        A: 0.004
        Ea_J_per_mol: 21000.0
  - reaction_id: ester_vaporization
    equation: Ester <=> Ester_vapor
    delta_h_J_per_mol: 36000.0
    rate_law:
      rate_law_id: ester_vaporization_rate
      equation_id: reversible_arrhenius
      parameters:
        A: 0.008
        Ea_J_per_mol: 18000.0
        K_eq: 0.35
  - reaction_id: alcohol_vaporization
    equation: Alcohol <=> Alcohol_vapor
    delta_h_J_per_mol: 41000.0
    rate_law:
      rate_law_id: alcohol_vaporization_rate
      equation_id: reversible_arrhenius
      parameters:
        A: 0.012
        Ea_J_per_mol: 16000.0
        K_eq: 0.65
  - reaction_id: water_vaporization
    equation: Water <=> Water_vapor
    delta_h_J_per_mol: 44000.0
    rate_law:
      rate_law_id: water_vaporization_rate
      equation_id: reversible_arrhenius
      parameters:
        A: 0.006
        Ea_J_per_mol: 17500.0
        K_eq: 0.22
